name: Release Build

on:
  push:
    tags:
      - 'v-[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build & Publish AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate tag format
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG (expected v-major.minor.patch)"
            exit 1
          fi

          VERSION="${TAG#v-}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "tag=$TAG"                   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          mkdir -p keys
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keys/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > keys/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK and AAB
        run: |
          ./gradlew assembleRelease bundleRelease \
            -PversionName="${{ steps.version.outputs.version }}" \
            -PversionCode="${{ steps.version.outputs.version_code }}"

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
